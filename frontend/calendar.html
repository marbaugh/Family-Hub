  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">📅 Calendar</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" id="syncBtn">🔄 Sync Google</button>
        <button class="btn btn-primary" id="addEventBtn">+ Add Event</button>
      </div>
    </header>

    <div class="calendar-nav">
      <button class="btn btn-icon" id="prevMonth">‹</button>
      <h2 class="calendar-month-title" id="calendarTitle"></h2>
      <button class="btn btn-icon" id="nextMonth">›</button>
      <button class="btn btn-ghost" id="todayBtn">Today</button>
    </div>

    <div class="calendar-wrapper">
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="day-events-panel" id="dayEventsPanel" style="display:none">
      <div class="section-header">
        <h3 class="section-title" id="dayEventTitle"></h3>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" style="padding:6px 14px;font-size:13px" id="addEventDayBtn" onclick="openEventModal(selectedDay)">+ Add</button>
          <button class="btn-close" id="closeDayPanel">✕</button>
        </div>
      </div>
      <div id="dayEventsList"></div>
    </div>
  </main>
</div>

<!-- Event Detail Popover -->
<div class="modal-overlay" id="eventDetailModal" style="display:none" onclick="closeEventDetail()">
  <div class="modal event-detail-modal" onclick="event.stopPropagation()">
    <div class="event-detail-color-bar" id="eventDetailBar"></div>
    <div class="modal-body" style="padding:20px 22px 18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <h3 class="event-detail-title" id="eventDetailTitle"></h3>
        <button class="btn-close" onclick="closeEventDetail()" style="flex-shrink:0">✕</button>
      </div>
      <div class="event-detail-time" id="eventDetailTime"></div>
      <div class="event-detail-location" id="eventDetailLocation" style="display:none;font-size:13px;margin-top:6px"></div>
      <div class="event-detail-desc" id="eventDetailDesc" style="display:none"></div>
      <div class="event-detail-tags" id="eventDetailTags"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-ghost" style="color:var(--red);font-size:13px" id="eventDetailDelete">🗑 Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Event Modal -->
<div class="modal-overlay" id="eventModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="eventModalTitle">Add Event</h3>
      <button class="btn-close" id="closeEventModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="eventTitle" class="form-input" placeholder="Event title">
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="eventLocation" class="form-input" placeholder="Optional location">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="eventDesc" class="form-input" rows="2" placeholder="Optional details"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start</label>
          <input type="datetime-local" id="eventStart" class="form-input">
        </div>
        <div class="form-group">
          <label>End</label>
          <input type="datetime-local" id="eventEnd" class="form-input">
        </div>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="eventAllDay"> All day event</label>
      </div>
      <div class="form-group">
        <label>Who</label>
        <select id="eventMember" class="form-input">
          <option value="">Whole family</option>
        </select>
      </div>
      <div class="form-group" id="calendarPickerGroup" style="display:none">
        <label>Google Calendar</label>
        <select id="eventCalendarId" class="form-input">
          <option value="none">Don't sync to Google</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="cancelEventModal">Cancel</button>
      <button class="btn btn-primary" id="saveEvent">Save Event</button>
    </div>
  </div>
</div>

<script src="/js/api.js?v=28"></script>
<script src="/js/calendar.js?v=28"></script>
<script src="/js/slideshow.js?v=28"></script>
<button class="slideshow-trigger" onclick="Slideshow.start()" title="Start slideshow">📷</button>
</body>
</html>
