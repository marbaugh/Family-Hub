  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">💬 Messages</h1>
    </header>

    <!-- Compose -->
    <section class="dashboard-section">
      <div class="msg-compose">
        <select id="msgAuthor" class="form-input msg-author-select">
          <option value="">— Who's posting? —</option>
        </select>
        <textarea id="msgBody" class="form-input msg-textarea" placeholder="Leave a note for the family… (e.g. 'I'm at practice, home by 6')" rows="2"></textarea>
        <button class="btn btn-primary msg-send-btn" onclick="postMessage()">Post</button>
      </div>
    </section>

    <!-- Messages board -->
    <section class="dashboard-section">
      <div id="msgBoard" class="msg-board">
        <!-- skeleton -->
        <div class="msg-card sk-card" style="height:100px"></div>
        <div class="msg-card sk-card" style="height:80px"></div>
        <div class="msg-card sk-card" style="height:120px"></div>
      </div>
      <div id="msgEmpty" class="empty-state" style="display:none">
        No messages yet. Leave a note for the family!
      </div>
    </section>
  </main>
</div>
